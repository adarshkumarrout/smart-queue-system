server:
  port: 8080

spring:
  application:
    name: smart-queue-system

  datasource:
    url: jdbc:mysql://mysql:3306/smartqueue?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: squser
    password: sqpass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    mongodb:
      uri: mongodb://mongoadmin:mongopass@mongodb:27017/smartqueue_logs?authSource=admin

    redis:
      host: redis
      port: 6379

  # KAFKA ISOLATED - Commented out for this project
  # kafka:
  #   bootstrap-servers: kafka:29092
  #   producer:
  #     key-serializer: org.apache.kafka.common.serialization.StringSerializer
  #     value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  #   consumer:
  #     group-id: smartqueue-group
  #     key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  #     value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
  #     auto-offset-reset: earliest
  #     properties:
  #       spring.json.trusted.packages: "com.smartqueue.*"

# Custom App Config
app:
  jwt:
    secret: smartQueueJwtSecretKey2024ProductionReadySystemByDeveloper
    expiration: 86400000

  rate-limit:
    max-joins-per-hour: 5

  queue:
    no-show-timeout-minutes: 10
    avg-service-time-minutes: 5

# Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

# Logging
logging:
  level:
    com.smartqueue: DEBUG
    # KAFKA ISOLATED - Commented out
    # org.springframework.kafka: INFO
