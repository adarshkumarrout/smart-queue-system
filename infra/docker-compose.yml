version: '3.8'

services:

  mysql:
    image: mysql:8.0
    container_name: smartqueue-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: smartqueue
      MYSQL_USER: squser
      MYSQL_PASSWORD: sqpass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      # REMOVED: init.sql volume mount - tables created by Hibernate, sample data handled by app
      # - /home/adarsha/smart-queue-system/docs/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - smartqueue-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6.0
    container_name: smartqueue-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongoadmin
      MONGO_INITDB_ROOT_PASSWORD: mongopass
      MONGO_INITDB_DATABASE: smartqueue_logs
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - smartqueue-net

  redis:
    image: redis:7.0-alpine
    container_name: smartqueue-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - smartqueue-net

  # KAFKA ISOLATED - Zookeeper commented out as it's only needed for Kafka
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.4.0
  #   container_name: smartqueue-zookeeper
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #     ZOOKEEPER_TICK_TIME: 2000
  #   networks:
  #     - smartqueue-net

  # KAFKA ISOLATED - Kafka commented out as it's no longer used
  # kafka:
  #   image: confluentinc/cp-kafka:7.4.0
  #   container_name: smartqueue-kafka
  #   depends_on:
  #     - zookeeper
  #   ports:
  #     - "9092:9092"
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
  #     KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
  #     KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #     KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  #   networks:
  #     - smartqueue-net

  backend:
    build:
      context: ../backend
    container_name: smartqueue-backend
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/smartqueue?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: squser
      SPRING_DATASOURCE_PASSWORD: sqpass
    networks:
      - smartqueue-net

  frontend:
    build:
      context: ../frontend
    container_name: smartqueue-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    networks:
      - smartqueue-net


volumes:
  mysql_data:
  mongo_data:
  redis_data:

networks:
  smartqueue-net:
    driver: bridge
